<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自然光影像 × 漣澐空拍 — 案件進度</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@200;300;400;500&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#2A2A2A;
  --surface:#313131;
  --rule:rgba(255,255,255,0.09);
  --rule2:rgba(255,255,255,0.05);
  --rule-strong:rgba(255,255,255,0.18);
  --gold:#C9A84C;
  --gold-dim:rgba(201,168,76,0.1);
  --text-primary:#EDE9E0;
  --text-secondary:#B0A898;
  --text-muted:#7A7570;
  --text-label:#C8C0B4;
  --applying:#C9A84C;
  --applying-bg:rgba(201,168,76,0.14);
  --applying-text:#EDD98A;
  --waiting:#7BA8C8;
  --waiting-bg:rgba(123,168,200,0.14);
  --waiting-text:#B8D4E8;
  --done:#7AAF8A;
  --done-bg:rgba(122,175,138,0.14);
  --done-text:#B4D4BE;
  --shooting:#9B8EC4;
  --shooting-bg:rgba(155,142,196,0.14);
  --shooting-text:#CCC0E8;
  --deadline:#D4826A;
}

html{font-size:17px}
body{
  background:var(--bg);
  color:var(--text-primary);
  font-family:'Noto Sans TC',sans-serif;
  font-weight:300;
  min-height:100vh;
}

.page{max-width:1100px;margin:0 auto;padding:0 2.5rem 7rem}

/* ── masthead ── */
.masthead{
  padding:4rem 0 2rem;
  border-bottom:1px solid var(--rule-strong);
  margin-bottom:2.5rem;
  display:grid;
  grid-template-columns:1fr auto;
  align-items:end;
  gap:2rem;
}
.brand{
  font-family:'DM Mono',monospace;
  font-size:10px;
  letter-spacing:0.25em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:1rem;
}
.title-zh{
  font-weight:200;
  font-size:clamp(32px,5vw,52px);
  letter-spacing:0.15em;
  color:var(--text-primary);
  line-height:1.1;
}
.title-zh strong{font-weight:400;color:#fff}
.title-en{
  font-family:'Cormorant Garamond',serif;
  font-size:13px;
  font-style:italic;
  color:var(--text-secondary);
  letter-spacing:0.15em;
  margin-top:.6rem;
}
.meta-block{text-align:right}
.meta-date{
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--text-secondary);
  letter-spacing:0.1em;
  line-height:2;
}
.meta-date strong{
  display:block;font-size:13px;
  color:var(--text-primary);font-weight:400;
}

/* dots */
.dots-motif{display:flex;align-items:center;gap:8px;margin-bottom:2rem}
.dot{width:9px;height:9px;border-radius:50%}
.dot-1{background:#6A6662}
.dot-2{background:var(--gold)}
.dot-3{background:#4E4C4A}

/* legend */
.legend{
  display:flex;gap:2rem;flex-wrap:wrap;
  margin-bottom:2.5rem;
  padding-bottom:1.5rem;
  border-bottom:1px solid var(--rule);
}
.leg{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-secondary);letter-spacing:0.1em;text-transform:uppercase}
.leg-line{width:20px;height:2px;border-radius:1px}

/* table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:760px}

thead tr.month-row th{
  padding:0 0 10px 4px;text-align:left;
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:0.2em;text-transform:uppercase;
  color:var(--text-secondary);
  border-bottom:1px solid var(--rule-strong);font-weight:300;
}
thead tr.month-row th.m-sep{border-left:1px solid var(--rule-strong)}

thead tr.week-row th{
  font-family:'DM Mono',monospace;font-size:9px;font-weight:300;
  color:var(--text-secondary);text-align:center;
  padding:10px 2px 8px;border-bottom:1px solid var(--rule);letter-spacing:0.05em;
}
thead tr.week-row th.proj-th,
thead tr.week-row th.note-th{color:transparent;border-bottom:1px solid var(--rule)}
thead tr.week-row th.today-w{color:var(--gold)}
thead tr.week-row th.m-sep{border-left:1px solid var(--rule)}

tbody tr{border-bottom:1px solid var(--rule2);cursor:pointer;transition:background .15s}
tbody tr:last-child{border-bottom:1px solid var(--rule)}
tbody tr:hover{background:rgba(255,255,255,0.025)}
tbody tr.active{background:var(--gold-dim)}
tbody tr.active td.proj-td{color:#fff}

td{height:46px;vertical-align:middle;padding:5px 3px}
td.proj-td{
  font-size:13px;font-weight:300;color:var(--text-primary);
  padding:0 20px 0 0;white-space:nowrap;min-width:140px;
  letter-spacing:0.06em;transition:color .15s;
}
td.empty{background:transparent}
td.today-w{background:rgba(201,168,76,0.04)}
td.m-sep{border-left:1px solid var(--rule)}
td.note-td{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);
  font-style:italic;text-align:right;padding-right:0;
  max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
td.deadline-td{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-muted);text-align:center;
  white-space:nowrap;padding:0 6px;min-width:72px;
  letter-spacing:0.04em;
}
td.deadline-td span{
  display:inline-block;padding:2px 6px;border-radius:2px;
  background:rgba(212,130,106,0.1);color:#C87A62;
  font-size:9px;
}

/* bars */
.bar{
  height:16px;border-radius:1px;
  display:flex;align-items:center;justify-content:center;
  font-family:'DM Mono',monospace;font-size:8px;
  letter-spacing:0.12em;text-transform:uppercase;
  overflow:hidden;white-space:nowrap;padding:0 5px;
}
.bar-applying{background:var(--applying-bg);color:var(--applying-text);border-left:2px solid var(--applying)}
.bar-waiting {background:var(--waiting-bg); color:var(--waiting-text); border-left:2px solid var(--waiting)}
.bar-done    {background:var(--done-bg);    color:var(--done-text);    border-left:2px solid var(--done)}
.bar-shooting{background:var(--shooting-bg);color:var(--shooting-text);border-left:2px solid var(--shooting)}

/* detail panel */
#detail-panel{
  margin-top:0;border-top:1px solid var(--rule-strong);
  padding-top:2.5rem;animation:fadeUp .2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

.panel-inner{
  display:grid;grid-template-columns:260px 1fr 1fr;
  gap:3rem;align-items:start;
}
@media(max-width:700px){.panel-inner{grid-template-columns:1fr}}

.panel-label{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-secondary);letter-spacing:0.22em;
  text-transform:uppercase;margin-bottom:.5rem;
}
.panel-name{
  font-weight:200;font-size:28px;
  letter-spacing:0.12em;color:#fff;line-height:1.2;margin-bottom:.25rem;
}
.panel-name-en{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:12px;color:var(--text-secondary);letter-spacing:0.15em;margin-bottom:1.5rem;
}

.status-list{display:flex;flex-direction:column;gap:10px}
.status-item{display:flex;align-items:center;gap:12px}
.status-pip{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.pip-applying{background:var(--applying)}
.pip-waiting {background:var(--waiting)}
.pip-done    {background:var(--done)}
.pip-shooting{background:var(--shooting)}
.status-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-secondary);letter-spacing:0.06em}
.status-range{color:var(--text-muted);margin-left:8px;font-style:italic}

/* deadline block in panel */
.deadline-block{
  background:rgba(212,130,106,0.07);
  border:1px solid rgba(212,130,106,0.2);
  border-radius:4px;
  padding:14px 18px;
  margin-top:1.5rem;
}
.deadline-block .dl-label{
  font-family:'DM Mono',monospace;font-size:9px;
  color:#C87A62;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:6px;
}
.deadline-block .dl-date{
  font-family:'DM Mono',monospace;font-size:16px;
  color:#E0A090;letter-spacing:0.08em;font-weight:400;
}
.deadline-block .dl-note{
  font-size:11px;color:var(--text-muted);margin-top:4px;letter-spacing:0.04em;
}

.close-row{display:flex;justify-content:flex-end;margin-bottom:2rem}
.close-btn{
  font-family:'DM Mono',monospace;font-size:9px;letter-spacing:0.2em;
  text-transform:uppercase;background:none;border:none;cursor:pointer;
  color:var(--text-muted);padding:0;transition:color .15s;
}
.close-btn:hover{color:var(--gold)}

.note-label-sm{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-secondary);letter-spacing:0.22em;
  text-transform:uppercase;margin-bottom:.6rem;
}
textarea.note-input{
  width:100%;background:transparent;border:none;
  border-bottom:1px solid var(--rule-strong);
  padding:8px 0;font-size:13px;font-family:'Noto Sans TC',sans-serif;
  font-weight:300;color:var(--text-primary);letter-spacing:0.05em;
  resize:none;min-height:90px;outline:none;transition:border-color .15s;line-height:1.7;
}
textarea.note-input::placeholder{color:var(--text-muted)}
textarea.note-input:focus{border-bottom-color:var(--gold)}

/* footer */
.site-footer{
  margin-top:4rem;padding-top:1.5rem;
  border-top:1px solid var(--rule);
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;
}
.footer-l,.footer-r{
  font-family:'DM Mono',monospace;font-size:9px;
  color:var(--text-secondary);letter-spacing:0.15em;text-transform:uppercase;
}
</style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <div>
      <div class="brand">自然光影像 × 漣澐空拍</div>
      <div class="title-zh"><strong>案件</strong>進度</div>
      <div class="title-en">Project Progress — Aerial Photography</div>
    </div>
    <div class="meta-block">
      <div class="meta-date">
        <strong id="today-str"></strong>
        Updated
      </div>
    </div>
  </header>

  <div class="dots-motif">
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
  </div>

  <div class="legend">
    <div class="leg"><div class="leg-line" style="background:var(--applying)"></div>申請中</div>
    <div class="leg"><div class="leg-line" style="background:var(--shooting)"></div>拍攝中</div>
    <div class="leg"><div class="leg-line" style="background:var(--waiting)"></div>申請完成，等待拍攝</div>
    <div class="leg"><div class="leg-line" style="background:var(--done)"></div>已拍攝完成</div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr class="month-row" id="month-row"></tr>
        <tr class="week-row"  id="week-row"></tr>
      </thead>
      <tbody id="gantt-body"></tbody>
    </table>
  </div>

  <div id="detail-panel" style="display:none"></div>

  <footer class="site-footer">
    <div class="footer-l">2026 空拍作業追蹤</div>
    <div class="footer-r" id="footer-hint">點選專案列查看詳情</div>
  </footer>

</div>
<script>
const months=[
  {label:"May 五月",key:5,weeks:[
    {w:"W1",s:"05/01",e:"05/07"},{w:"W2",s:"05/08",e:"05/14"},{w:"W3",s:"05/15",e:"05/21"},
    {w:"W4",s:"05/22",e:"05/28"},{w:"W5",s:"05/29",e:"05/31"}
  ]},
  {label:"June 六月",key:6,weeks:[
    {w:"W1",s:"06/01",e:"06/07"},{w:"W2",s:"06/08",e:"06/14"},{w:"W3",s:"06/15",e:"06/21"},
    {w:"W4",s:"06/22",e:"06/28"},{w:"W5",s:"06/29",e:"06/30"}
  ]},
  {label:"July 七月",key:7,weeks:[
    {w:"W1",s:"07/01",e:"07/07"},{w:"W2",s:"07/08",e:"07/14"},{w:"W3",s:"07/15",e:"07/21"},
    {w:"W4",s:"07/22",e:"07/28"},{w:"W5",s:"07/29",e:"07/31"}
  ]}
];

const allWeeks=[];
months.forEach(m=>m.weeks.forEach((wk,i)=>allWeeks.push({...wk,month:m.key,firstOfMonth:i===0})));

const now=new Date(),todayM=now.getMonth()+1,todayD=now.getDate();
document.getElementById("today-str").textContent=
  `${now.getFullYear()}.${String(todayM).padStart(2,'0')}.${String(todayD).padStart(2,'0')}`;

function isTodayWeek(wk){
  const[sm,sd]=wk.s.split('/').map(Number),[em,ed]=wk.e.split('/').map(Number);
  if(sm===em)return todayM===sm&&todayD>=sd&&todayD<=ed;
  return(todayM===sm&&todayD>=sd)||(todayM===em&&todayD<=ed);
}

const SL={applying:"申請中",waiting:"等待拍攝",done:"已完成",shooting:"拍攝中"};
const PIP={applying:"pip-applying",waiting:"pip-waiting",done:"pip-done",shooting:"pip-shooting"};
const BAR={applying:"bar-applying",waiting:"bar-waiting",done:"bar-done",shooting:"bar-shooting"};

// deadline: 申請生效期限，填 null 代表尚未確認
// col: 0–4=5月W1–W5 | 5–9=6月W1–W5 | 10–14=7月W1–W5
const projects=[
  {name:"立信 新外灘",   en:"Lixin Xinwaitan",     deadline:"已失效",      deadlineNote:"申請已逾期",  bars:[{col:0,span:1,type:"done"}]},
  {name:"大陸建設 衡玥", en:"Continental Hengyue", deadline:"2026.04.09 — 2026.05.28", deadlineNote:"效期區間",   bars:[{col:0,span:1,type:"done"}]},
  {name:"璞真 業績",     en:"Puzhen Yeji",          deadline:"2026.04.12 — 2026.06.11", deadlineNote:"效期區間",   bars:[{col:0,span:5,type:"done"}], note:"待確認內容"},
  {name:"永雄 卓閱",     en:"Yongxiong Zhuoyue",   deadline:"2026.05.17 — 2026.07.16", deadlineNote:"效期區間",   bars:[{col:0,span:4,type:"waiting"}]},
  {name:"掬月 白",       en:"Juyue Bai",            deadline:"2026.05.28 — 2026.07.27", deadlineNote:"效期區間",   bars:[{col:4,span:5,type:"waiting"}]},
  {name:"萬華 鄉林",     en:"Wanhua Xianglin",      deadline:"2026.05.17 — 2026.07.16", deadlineNote:"效期區間",   bars:[{col:4,span:5,type:"shooting"}], note:"已拍攝完成，待確認需修正內容"},
  {name:"萬華 新碩",     en:"Wanhua Xinsuo",         deadline:"2026.05.17 — 2026.07.16", deadlineNote:"效期區間",   bars:[{col:4,span:5,type:"shooting"}], note:"已拍攝部分內容"},
  {name:"桓鉅 南西案",   en:"Huanju Nanxi",         deadline:"2026.05.28 — 2026.07.27", deadlineNote:"效期區間",   bars:[{col:4,span:5,type:"waiting"}]},
];

const notes={};
let activeIdx=null;

function buildHead(){
  const mr=document.getElementById("month-row");
  const wr=document.getElementById("week-row");

  let mh=`<th class="proj-th" style="min-width:140px;padding-bottom:10px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;color:#B0A898;border-bottom:1px solid rgba(255,255,255,0.18)"></th>`;
  months.forEach((m,mi)=>{
    const sep=mi>0?' m-sep':'';
    mh+=`<th colspan="${m.weeks.length}" class="${sep}" style="padding:0 0 10px 4px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#B0A898;border-bottom:1px solid rgba(255,255,255,0.18);text-align:left;font-weight:300">${m.label}</th>`;
  });
  mh+=`<th style="min-width:72px;padding:0 0 10px 6px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#C87A62;border-bottom:1px solid rgba(255,255,255,0.18);text-align:center;font-weight:300">期限</th>`;
  mh+=`<th class="note-th" style="min-width:90px;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,0.18)"></th>`;
  mr.innerHTML=mh;

  let wh=`<th class="proj-th week-th"></th>`;
  allWeeks.forEach((wk,i)=>{
    const tw=isTodayWeek(wk)?' today-w':'';
    const sep=wk.firstOfMonth&&i>0?' m-sep':'';
    wh+=`<th class="week-th${tw}${sep}">${wk.w}</th>`;
  });
  wh+=`<th class="week-th" style="color:transparent"></th>`;
  wh+=`<th class="note-th week-th"></th>`;
  wr.innerHTML=wh;
}

function buildBody(){
  let html='';
  projects.forEach((p,pi)=>{
    const cells=Array(allWeeks.length).fill(null);
    p.bars.forEach(b=>{
      for(let i=b.col;i<b.col+b.span&&i<allWeeks.length;i++)
        cells[i]=i===b.col?{...b,first:true}:{skip:true};
    });
    html+=`<tr onclick="selectProject(${pi})" id="row-${pi}">`;
    html+=`<td class="proj-td">${p.name}</td>`;
    cells.forEach((c,ci)=>{
      if(c&&c.skip)return;
      const tw=isTodayWeek(allWeeks[ci])?' today-w':'';
      const sep=allWeeks[ci].firstOfMonth&&ci>0?' m-sep':'';
      if(c&&c.first){
        html+=`<td colspan="${c.span}" class="${tw}${sep}" style="padding:5px 3px">`;
        html+=`<div class="bar ${BAR[c.type]}">${SL[c.type]}</div></td>`;
      }else{
        html+=`<td class="empty${tw}${sep}"></td>`;
      }
    });
    // deadline column
    const dlDisplay = p.deadline ? (p.deadline.startsWith('2026.') ? p.deadline.slice(5) : p.deadline) : '—';
    html+=`<td class="deadline-td"><span>${dlDisplay}</span></td>`;
    html+=`<td class="note-td" id="np-${pi}">—</td></tr>`;
  });
  document.getElementById("gantt-body").innerHTML=html;
}

function selectProject(idx){
  if(activeIdx!==null)document.getElementById(`row-${activeIdx}`).classList.remove('active');
  if(activeIdx===idx){
    activeIdx=null;
    document.getElementById("detail-panel").style.display="none";
    document.getElementById("footer-hint").textContent="點選專案列查看詳情";
    return;
  }
  activeIdx=idx;
  document.getElementById(`row-${idx}`).classList.add('active');
  renderPanel(idx);
  document.getElementById("footer-hint").textContent="再次點選收起";
}

function renderPanel(idx){
  const p=projects[idx];
  let items='';
  p.bars.forEach(b=>{
    const ws=allWeeks[b.col],we=allWeeks[Math.min(b.col+b.span-1,allWeeks.length-1)];
    items+=`<div class="status-item">
      <div class="status-pip ${PIP[b.type]}"></div>
      <div class="status-text">${SL[b.type]}<span class="status-range">${ws.s} — ${we.e} · ${b.span}W</span></div>
    </div>`;
  });

  const dlBlock = `
    <div class="deadline-block">
      <div class="dl-label">申請生效期限</div>
      <div class="dl-date">${p.deadline || '尚未確認'}</div>
      <div class="dl-note">${p.deadlineNote || ''}</div>
    </div>`;

  const panel=document.getElementById("detail-panel");
  panel.innerHTML=`
    <div class="close-row"><button class="close-btn" onclick="closePanel()">Close ✕</button></div>
    <div class="panel-inner">
      <div>
        <div class="panel-label">Project</div>
        <div class="panel-name">${p.name}</div>
        <div class="panel-name-en">${p.en}</div>
        <div class="status-list">${items}</div>
        ${dlBlock}
      </div>
      <div>
        <div class="panel-label">備注 / Notes</div>
        <textarea class="note-input" id="ni-${idx}" placeholder="輸入備注…"
          oninput="saveNote(${idx},this.value)">${notes[idx]!==undefined ? notes[idx] : (p.note||'')}</textarea>
      </div>
    </div>`;
  panel.style.display="block";
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closePanel(){
  if(activeIdx!==null)document.getElementById(`row-${activeIdx}`).classList.remove('active');
  activeIdx=null;
  document.getElementById("detail-panel").style.display="none";
  document.getElementById("footer-hint").textContent="點選專案列查看詳情";
}

function saveNote(idx,val){
  notes[idx]=val;
  const p=document.getElementById(`np-${idx}`);
  if(p)p.textContent=val.trim()?val.slice(0,14)+(val.length>14?'…':''):'—';
}

buildHead();
buildBody();
</script>
</body>
</html>
